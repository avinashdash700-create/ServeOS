<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title>ServeOS Project Overview</title>
  <desc>Architecture and benefits overview for the ServeOS AI outreach CRM automation system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff" />
      <stop offset="100%" stop-color="#f8f8ff" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)" />
  <rect x="40" y="40" width="1120" height="140" rx="28" fill="url(#panel)" filter="url(#shadow)" />
  <text x="80" y="100" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="700" fill="#2c3e8f">ServeOS</text>
  <text x="80" y="160" font-family="Inter, Arial, sans-serif" font-size="26" fill="#202840">AI-powered Outreach CRM Automation</text>
  <rect x="80" y="190" width="430" height="110" rx="22" fill="#ffffff" stroke="#dde2ff" stroke-width="1.5" filter="url(#shadow)" />
  <text x="110" y="235" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#2b3a82">What it is</text>
  <text x="110" y="265" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4e587b">AI-driven outreach drafts, follow-up workflows,</text>
  <text x="110" y="290" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4e587b">Supabase realtime CRM, and webhook automation.</text>
  <rect x="560" y="190" width="430" height="110" rx="22" fill="#ffffff" stroke="#dde2ff" stroke-width="1.5" filter="url(#shadow)" />
  <text x="590" y="235" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#2b3a82">Benefits</text>
  <text x="590" y="265" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4e587b">Personalized outreach, automated follow-ups,</text>
  <text x="590" y="290" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4e587b">realtime engagement, and unified history.</text>
  <rect x="80" y="330" width="990" height="270" rx="28" fill="#ffffff" stroke="#dde2ff" stroke-width="1.5" filter="url(#shadow)" />
  <text x="110" y="380" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#2b3a82">Architecture</text>
  <line x1="110" y1="410" x2="1090" y2="410" stroke="#d6def8" stroke-width="2" />
  <g>
    <rect x="120" y="430" width="180" height="140" rx="20" fill="#eef2ff" />
    <text x="170" y="470" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2b3a82">Frontend</text>
    <text x="170" y="495" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58618c">React + Vite + Lovable</text>
    <text x="170" y="515" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58618c">Cloudflare SSR</text>
  </g>
  <g>
    <rect x="360" y="430" width="180" height="140" rx="20" fill="#eef2ff" />
    <text x="400" y="470" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2b3a82">Supabase</text>
    <text x="400" y="495" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58618c">Auth + Postgres</text>
    <text x="400" y="515" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58618c">Realtime sync</text>
  </g>
  <g>
    <rect x="600" y="430" width="180" height="140" rx="20" fill="#eef2ff" />
    <text x="650" y="470" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2b3a82">n8n</text>
    <text x="650" y="495" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58618c">Workflow automation</text>
    <text x="650" y="515" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58618c">Outreach / follow-up</text>
  </g>
  <g>
    <rect x="840" y="430" width="180" height="140" rx="20" fill="#eef2ff" />
    <text x="890" y="470" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2b3a82">Gemini AI</text>
    <text x="890" y="495" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58618c">AI draft generation</text>
    <text x="890" y="515" font-family="Inter, Arial, sans-serif" font-size="14" fill="#58618c">Natural language output</text>
  </g>
  <g>
    <path d="M300 500 L340 500" stroke="#5b6fd3" stroke-width="4" marker-end="url(#arrow)" />
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6fd3" />
    </marker>
  </defs>
  <text x="110" y="620" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#2b3a82">AI learnings</text>
  <rect x="110" y="635" width="980" height="30" rx="15" fill="#eef2ff" />
  <text x="130" y="656" font-family="Inter, Arial, sans-serif" font-size="16" fill="#2b3a82">Sanitize AI output · Keep webhook secrets client-safe · Store structured drafts · Orchestrate with n8n</text>
</svg>
